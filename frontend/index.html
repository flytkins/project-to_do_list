<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>TODO List</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>TODO List</h1>

    <form id="taskForm">
      <input type="text" id="title" placeholder="Название задачи" required />
      <button type="submit">Добавить</button>
      <button type="button" onclick="toggleSort()">Сортировка</button>
    </form>

    <!-- New search input -->
    <div class="search-container">
      <input type="text" id="searchInput" placeholder="Поиск задач..." />
    </div>

    <ul id="taskList"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
