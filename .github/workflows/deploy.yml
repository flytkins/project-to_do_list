name: Deploy to VPS

on:
  push:
    branches: [main, master]

jobs:
  test_backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run backend tests
        env:
          DATABASE_URL: "sqlite:///:memory:"
        run: |
          cd backend
          pytest -v --cov=app

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install
          npx playwright install --with-deps chromium

      - name: Create simple frontend test
        run: |
          mkdir -p frontend/tests
          cat > frontend/tests/homepage.spec.js << 'EOF'
          const { test, expect } = require('@playwright/test');
          test('Frontend loads and has correct title', async ({ page }) => {
            await page.goto('http://localhost:8080/index.html');
            await expect(page).toHaveTitle(/TODO List/);
            const header = await page.locator('h1').first();
            await expect(header).toHaveText('TODO List');
          });
          EOF

      - name: Start backend
        run: |
          cd backend
          pip install -r requirements.txt
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
        env:
          DATABASE_URL: "sqlite:///:memory:"

      - name: Serve frontend
        run: |
          cd frontend
          python -m http.server 8080 &
          sleep 2

      - name: Run Playwright tests
        run: |
          cd frontend
          npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/test-results/

  deploy:
    needs: [test_backend, test-frontend] # Ждём успеха обоих тестов
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure Dockerfile naming
        run: |
          if [ -f backend/Dockerfile.txt ]; then
            mv backend/Dockerfile.txt backend/Dockerfile
          fi

      - name: Copy files to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          source: ".,!**/.git,!**/.env"
          target: ${{ secrets.VPS_PATH }}
          strip_components: 0

      - name: Execute remote deployment commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.VPS_PATH }}
            if [ ! -f .env ]; then
              cp .env.example .env
              echo "⚠️ Please edit .env with real passwords manually!"
              exit 1
            fi
            docker compose down
            docker compose up --build -d
            docker image prune -f
